<div class="container">
  <div class="card bg-light">
    <div class="card-body">
      <div class="text-center">
        <h3>Creazione Bozza</h3>
      </div>
      <br>

      <form (ngSubmit)="onSubmit()" name="myForm">

        <!-- Sezione per la selezione della data -->
        <div class="mb-3">
          <label for="date" class="form-label">Seleziona una data di inizio (solo Lunedì)</label>
          <select class="form-select" id="date" name="date" [(ngModel)]="formData.date" (ngModelChange)="onDateChange()" required>
            <option value="" disabled selected>Scegli una data</option>
            <option *ngFor="let monday of mondays" [value]="monday">{{ monday | date: 'dd-MM-yyyy' }}</option>
          </select>
          <div class="invalid-feedback">Seleziona una data di inizio.</div>
        </div>

        <div *ngIf="holidaysForCurrentYear.length > 0" class="mt-3 d-flex">
          <div class="container">
            <h6>Festività della settimana:</h6>
            <ul>
              <li *ngFor="let holiday of holidaysForCurrentYear">
                <span style="font-weight: bold;">{{ holiday.name }}</span> - {{ holiday.date | date: 'dd/MM/yyyy' }}
              </li>
            </ul>
          </div>
          <div class="ml-auto"></div>
        </div>

        <!-- Sezione per selezionare i lavoratori -->
        <div class="card mb-3">
          <div class="card-body">
            <label class="form-label">Lavoratori da Selezionare</label>
            <ul class="list-group">
              <li *ngFor="let worker of workers" class="list-group-item d-flex justify-content-between align-items-center">
                <span>{{ worker.firstName }} {{ worker.lastName }}</span>
                <button type="button" class="btn btn-sm btn-primary" (click)="addWorker(worker)">Aggiungi</button>
              </li>
            </ul>
          </div>
        </div>

        <!-- Sezione per visualizzare i lavoratori selezionati -->
        <div *ngIf="formData.workers.length > 0" class="card mb-3">
          <div class="card-body">
            <label class="form-label">Lavoratori Selezionati</label>
            <ul class="list-group">
              <li *ngFor="let selectedWorker of formData.workers" class="list-group-item d-flex justify-content-between align-items-center">
                <span>{{ getWorkerName(selectedWorker) }}</span>
                <button type="button" class="btn btn-sm btn-danger" (click)="removeWorker(selectedWorker)">Rimuovi</button>
              </li>
            </ul>
          </div>
        </div>

        <!-- Sezione per selezionare il numero di lavoratori -->
        <div class="card mb-3">
          <div class="card-body">
            <h6 class="card-title">Numero lavoratori per giorno</h6>
            <ng-container *ngFor="let i of [0, 1, 2, 3, 4, 5, 6]">
              <label class="form-label d-block">{{ dayLabels[i] }}: {{ giorniPreferenze[i] }}</label>
              <input
                type="range"
                class="form-range my-2"
                [name]="'numberOfWorkers' + i"
                [(ngModel)]="giorniPreferenze[i]"
                min="0"
                [max]="formData.workers.length"
                step="1"
              >
            </ng-container>
          </div>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="sendNotifications" name="sendNotifications" [(ngModel)]="formData.sendNotifications">
          <label class="form-check-label" for="sendNotifications">Invia notifiche agli utenti</label>
        </div>

        <!-- Bottone per inviare il form -->
        <div class="text-center">
          <button type="submit" class="btn btn-primary btn-lg w-100">Invia</button>
        </div>

      </form>
    </div>
  </div>

  <div *ngIf="message" class="alert alert-success mt-4">
    {{ message }}
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger mt-4">
    <span>{{ errorMessage }}</span>
  </div>
</div>
