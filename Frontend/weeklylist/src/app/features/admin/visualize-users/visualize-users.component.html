<div class="container mt-3">
  <h2 class="text-center">Lista Utenti</h2>
  <hr>
  <br>
  <div class="card bg-light">
    <div class="card-body">
      <div *ngFor="let user of users" class="card mb-3">
        <div class="card-body">
          <div class="row align-items-center">
            <div class="col-md-8">
              <h5 class="card-title">{{ user.firstName }} {{ user.lastName }} <span *ngIf="user.isOwner">(Admin)</span></h5>
              <ul class="list-unstyled">
                <li><small>{{ user.email }}</small></li>
                <li><small>Notifiche attive: {{ user.notificationActived ? 'Sì' : 'No' }}</small></li>
              </ul>
            </div>
            <div class="col-md-4">
              <div class="container mb-2 text-center">
                <button class="btn btn-danger btn-sm btn-block" (click)="deleteUser(user._id)">
                  <i class="fa fa-trash"></i> Elimina
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
