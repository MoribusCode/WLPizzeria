<div class="container mt-3">
  <div class="card bg-light">
    <div class="card-body">
      <h2>Lista Utenti</h2>

      <div *ngFor="let user of users" class="card mb-3">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h5 class="card-title">{{ user.firstName }} {{ user.lastName }} <span *ngIf="user.isOwner">(Admin)</span></h5>
            <p class="card-text"><small class="text-muted">{{ user.email }}</small></p>
          </div>
        </div>
        <div *ngIf="user._id !== getSelfId() || !isAdmin()">
          <div class="container mb-2 text-center">
            <button class="btn btn-danger btn-sm btn-block mx-auto" (click)="deleteUser(user._id)">
              <i class="fa fa-trash"></i> Elimina
            </button>
          </div>
        </div>


      </div>
    </div>
  </div>
</div>
