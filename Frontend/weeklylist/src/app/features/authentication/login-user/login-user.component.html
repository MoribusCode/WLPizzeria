<div class="container transparent-background">
  <div class="row">
    <div class="col-lg-4 col-md-6 mx-auto">
      <div class="card">
        <div class="card-body text-center loginform">
          <i class="fas fa-envelope loginlogo"></i>
          <h1 class="h3 mb-3 font-weight-normal">Accedi al Portale</h1>

          <div>
            <label for="inputEmail" class="sr-only">Email address</label>
            <input type="email" [(ngModel)]="email" id="inputEmail" class="form-control mb-2" placeholder="Email address" required autofocus>
          </div>
          <div>
            <label for="inputPassword" class="sr-only">Password</label>
            <input type="password" [(ngModel)]="password" id="inputPassword" class="form-control mb-3" placeholder="Password" required>
          </div>

          <div *ngIf="errmessage" class="alert alert-danger" role="alert">
            Login error: {{ errmessage }}
          </div>

          <button class="btn btn-lg btn-primary btn-block" (click)="login()">Vai!</button>

          <p class="mt-5 mb-3 text-muted">&copy; Pagano Matteo 2023</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<ng-template #tokenExpiredModal>
  <div class="modal-header">
    <h4 class="modal-title">Avviso di Sicurezza</h4>
  </div>
  <div class="modal-body">
    <p>Il tuo token di accesso è scaduto. Per favore, effettua nuovamente l'accesso.</p>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-light" (click)="closeModal()">chiudi</button>
  </div>
</ng-template>
